name: MCN CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: [3.8, 3.9, '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov

    - name: Test MCN Examples
      run: |
        python run_mcn.py run examples/hello.mcn
        python run_mcn.py run examples/business.mcn

    - name: Run Tests
      run: |
        python -m pytest test/ -v --cov=mcn-lang

    - name: Test Installation
      run: |
        pip install -e .
        mcn run examples/hello.mcn

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run Security Scan
      uses: pypa/gh-action-pip-audit@v1.0.8
      with:
        inputs: requirements.txt

    - name: Check for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD

  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install quality tools
      run: |
        pip install black flake8 mypy

    - name: Check code formatting
      run: black --check .

    - name: Lint code
      run: flake8 mcn-lang/ --max-line-length=88

    - name: Type check
      run: mypy mcn-lang/ --ignore-missing-imports
