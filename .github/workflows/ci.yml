name: MCN CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov psycopg2-binary pymongo sqlalchemy requests fastapi uvicorn python-dotenv

    - name: Test MCN Examples
      run: |
        export PYTHONPATH=$PWD
        python run_mcn.py run examples/hello.mcn
        python run_mcn.py run examples/business.mcn

    - name: Run Tests
      run: |
        export PYTHONPATH=$PWD
        python -m pytest test/test_basic.py -v --cov=mcn --tb=short

    - name: Test Package Import
      run: |
        export PYTHONPATH=$PWD
        python -c "from mcn.core_engine.mcn_interpreter import MCNInterpreter; print('✅ Package imports working')"

    - name: Test Installation
      run: |
        pip install -e .
        mcn run examples/hello.mcn

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run Security Scan
      uses: pypa/gh-action-pip-audit@v1.0.8
      with:
        inputs: requirements.txt

    - name: Check for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.before }}
        head: ${{ github.sha }}
        extra_args: --only-verified
      continue-on-error: true

  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install quality tools
      run: |
        pip install black flake8 mypy

    - name: Check code formatting
      run: black --check .
      continue-on-error: true

    - name: Lint code
      run: flake8 mcn/ --max-line-length=88 --exclude=mcn/studio,mcn/web-playground
      continue-on-error: true

    - name: Type check
      run: mypy mcn/ --ignore-missing-imports --exclude-dir=mcn/studio --exclude-dir=mcn/web-playground
      continue-on-error: true
