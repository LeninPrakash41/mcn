name: MCN Release CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov psycopg2-binary pymongo sqlalchemy requests fastapi uvicorn python-dotenv

    - name: Test MCN Examples
      run: |
        export PYTHONPATH=$PWD
        python run_mcn.py run examples/hello.mcn
        python run_mcn.py run examples/business.mcn

    - name: Run Basic Tests Only
      run: |
        export PYTHONPATH=$PWD
        python -m pytest test/test_basic.py -v --cov=mcn --tb=short

  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install quality tools
      run: |
        pip install black flake8

    - name: Check code formatting
      run: |
        black --check . --exclude="mcn/studio|mcn/web-playground" || echo "Formatting issues found (non-blocking)"
      continue-on-error: true

    - name: Lint code
      run: |
        flake8 mcn/ --max-line-length=88 --exclude=mcn/studio,mcn/web-playground --count || echo "Linting issues found (non-blocking)"
      continue-on-error: true

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: HEAD~1
        head: HEAD
        extra_args: --only-verified
      continue-on-error: true