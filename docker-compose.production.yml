version: '3.8'

services:
  mcn-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - MCN_ENV=production
      - MCN_PORT=8080
      - MCN_DEBUG=false
      - MCN_ENABLE_CORS=true
      - MCN_MAX_FILE_SIZE=10485760
      - MCN_RATE_LIMIT=100
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mcn-database:
    image: postgres:15
    environment:
      - POSTGRES_DB=mcn_production
      - POSTGRES_USER=mcn_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  mcn-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: